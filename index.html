<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUV | 自賠責保険閲覧ポータル</title>
  <meta http-equiv="refresh" content="0; url=./huv_insurance_portal.html" />
  <style>
    :root{
      --bg:#f3f1eb;
      --paper:#f7f5ef;
      --ink:#151515;
      --sub:#595959;
      --line:#cfc9be;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:linear-gradient(180deg, #f3f1eb 0%, #ece7dd 100%);
      color:var(--ink);
      font-family:
        "Helvetica Neue",
        "Arial",
        "Hiragino Sans",
        "Yu Gothic",
        sans-serif;
    }

    .card{
      width:min(100%, 560px);
      padding:28px;
      border:1px solid var(--line);
      background:var(--paper);
      text-align:center;
    }

    img{
      width:min(180px, 100%);
      height:auto;
      display:block;
      margin:0 auto 18px;
    }

    h1{
      margin:0;
      font-size:32px;
      line-height:1;
      letter-spacing:-.05em;
      text-transform:uppercase;
    }

    p{
      margin:12px 0 0;
      color:var(--sub);
      font-size:14px;
      line-height:1.7;
    }

    .actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 16px;
      border:1px solid var(--ink);
      color:var(--ink);
      text-decoration:none;
      font-size:11px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="./images/huv-logo-horizontal-trimmed.png" alt="HUV" />
    <h1>Insurance Portal</h1>
    <p>自動的に自賠責保険閲覧ポータルへ移動します。移動しない場合は下のボタンを押してください。</p>
    <div class="actions">
      <a class="btn" href="./huv_insurance_portal.html">保険ポータルへ</a>
      <a class="btn" href="./huv_lp.html">HUV LPを見る</a>
    </div>
  </main>
</body>
</html>
