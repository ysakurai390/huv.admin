<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ご利用案内・お問い合わせ | NanoAct</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --line: #dddddd;
      --text: #222222;
      --muted: #666666;
      --soft: #f0f0f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .hero {
      padding: 28px 24px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.25;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .links {
      display: grid;
      gap: 14px;
    }

    .link-card {
      display: block;
      text-decoration: none;
      color: var(--text);
      padding: 22px 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      transition: background-color 0.15s ease, transform 0.15s ease;
    }

    .link-card:hover {
      background: var(--soft);
      transform: translateY(-1px);
    }

    .link-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.35;
    }

    .link-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .arrow {
      display: inline-block;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100%, calc(100% - 20px));
        padding-top: 16px;
      }

      .hero,
      .link-card {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>ご利用案内・お問い合わせ</h1>
      <p class="lead">ご利用方法の確認、お問い合わせ、緊急時のご案内はこちらからご確認ください。</p>
    </section>

    <section class="links">
      <a class="link-card" href="https://ysakurai390.github.io/HUV_user-guide/" target="_blank" rel="noopener noreferrer">
        <h2>使い方・よくある質問</h2>
        <p>車両の基本的な使い方、操作方法、よくある質問を確認できます。</p>
        <span class="arrow">ページを開く</span>
      </a>

      <a class="link-card" href="https://forms.office.com/Pages/ResponsePage.aspx?id=tXXefBLjeEmMcUNczENLjFiwHE9kCUhPi9AHtulHIeRURFgySlZEM05XRko0MTFQUkUzUzdZNUwxWi4u" target="_blank" rel="noopener noreferrer">
        <h2>お問い合わせフォーム</h2>
        <p>ご不明点やご相談がある場合は、こちらのフォームからご連絡ください。</p>
        <span class="arrow">フォームを開く</span>
      </a>

      <a class="link-card" href="https://ysakurai390.github.io/HUV_emergency-guide/" target="_blank" rel="noopener noreferrer">
        <h2>緊急時のご案内</h2>
        <p>事故・接触や車両トラブルが起きた際の対応手順を確認できます。</p>
        <span class="arrow">ページを開く</span>
      </a>
    </section>
  </main>
</body>
</html>
